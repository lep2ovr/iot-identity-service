<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>TPM2 Certificate Manager</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 2em auto;
            padding: 0 1em;
            color: #222
        }

        .box {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 1em;
            margin: 1em 0;
            background: #fafafa
        }

        pre {
            background: #f0f0f0;
            padding: .8em;
            overflow: auto;
            font-size: 12px;
            border-radius: 4px
        }

        .ok {
            color: #0a7
        }

        .err {
            color: #b00
        }

        .muted {
            color: #888
        }

        button,
        input[type=file] {
            font-size: 14px
        }
    </style>
</head>

<body>
    <h1>TPM2 Certificate Manager</h1>
    <p class="muted">Handle: <code id="handle">-</code> &middot; CSR: <span id="csrState">-</span> &middot; Cert: <span
            id="certState">-</span></p>

    <div class="box">
        <h2>1. CSR generated by TPM</h2>
        <pre id="csr">loading...</pre>
        <button onclick="downloadCsr()">Download CSR</button>
    </div>

    <div class="box">
        <h2>2. Upload signed certificate (PEM)</h2>
        <input type="file" id="certFile" accept=".pem,.crt,.cer">
        <button onclick="uploadCert()">Upload</button>
        <p id="uploadMsg"></p>
    </div>

    <div class="box">
        <h2>3. Validate certificate matches TPM key</h2>
        <button onclick="validate()">Run validation</button>
        <p id="validateMsg"></p>
    </div>

    <div class="box">
        <h2>4. Generate and sign leaf certificate</h2>
        <button onclick="genLeaf()">Generate leaf cert</button>
        <pre id="leafResult"></pre>
    </div>

    <script>
        const BASE = location.pathname.replace(/\/$/, '');
        async function refresh() {
            const s = await fetch(BASE + '/api/status').then(r => r.json());
            handle.textContent = s.handle;
            csrState.textContent = s.csr_present ? 'present' : 'missing';
            certState.textContent = s.cert_present ? 'present' : 'missing';
            const c = await fetch(BASE + '/api/csr').then(r => r.json());
            document.getElementById('csr').textContent = c.pem || '(no CSR yet)';
        }
        function downloadCsr() { window.location = BASE + '/api/csr'; }
        async function uploadCert() {
            const f = document.getElementById('certFile').files[0];
            if (!f) { uploadMsg.textContent = 'Select a file first.'; return; }
            const body = await f.text();
            const r = await fetch(BASE + '/api/cert', { method: 'POST', body });
            const j = await r.json();
            uploadMsg.innerHTML = j.ok ? `<span class="ok">Saved: ${j.path}</span>` : `<span class="err">${j.error}</span>`;
            refresh();
        }
        async function validate() {
            const r = await fetch(BASE + '/api/validate', { method: 'POST' });
            const j = await r.json();
            validateMsg.innerHTML = j.ok
                ? '<span class="ok">VALID: cert public key matches TPM key and a sign/verify roundtrip succeeded.</span>'
                : `<span class="err">INVALID. pubkey_match=${j.pubkey_match}, sign_verify=${j.sign_verify_roundtrip}<br>${(j.errors || []).join('<br>')}</span>`;
        }

        async function genLeaf() {
            leafResult.textContent = 'Generating...';
            const r = await fetch(BASE + '/api/gen-signed-leaf', { method: 'POST' });
            const j = await r.json();
            if (j.ok) {
                leafResult.innerHTML = `<span class='ok'>Leaf key: ${j.leaf_key}<br>Leaf CSR: ${j.leaf_csr}<br>Leaf Cert: ${j.leaf_cert}</span>`;
            } else {
                leafResult.innerHTML = `<span class='err'>${j.error || 'Failed to generate leaf certificate.'}</span>`;
            }
        }
        refresh();
    </script>
</body>

</html>
